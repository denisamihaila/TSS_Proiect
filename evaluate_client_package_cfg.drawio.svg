  <text x="245" y="1340" class="label">True</text>
  <path d="M445 1270 L590 1360" class="edge" />
  <text x="496" y="1295" class="label">False</text>
  <path d="M350 1389 L590 1360" class="edge" />
  <path d="M790 1430 L820 1430" class="edge" />
  <text x="798" y="1420" class="label">True</text>
  <path d="M590 1500 L590 1515" class="edge" />
