  <text x="386" y="925" class="label">True</text>
  <path d="M770 935 L805 935" class="edge" />
  <text x="778" y="925" class="label">False</text>
  <path d="M265 965 L265 1028 L505 1028 L505 545 L410 545" class="edge" />
  <path d="M935 965 L935 1028 L675 1028 L675 545 L770 545" class="edge" />
  <path d="M590 620 L275 620 L275 1065 L590 1065" class="edge" />
  <text x="290" y="610" class="label">False</text>
  <path d="M590 1135 L590 1180" class="edge" />
  <path d="M770 1250 L835 1250" class="edge" />
  <text x="800" y="1240" class="label">True</text>
