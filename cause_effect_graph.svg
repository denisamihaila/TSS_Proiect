<?xml version="1.0" encoding="UTF-8"?>
<svg width="1180" height="760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .title { font-size: 17px; font-weight: 700; fill: #111; }
      .section { font-size: 12px; font-weight: 700; fill: #555; text-transform: uppercase; }
      .node { fill: #fff; stroke: #111; stroke-width: 2.4; }
      .and-node { fill: #fff; stroke: #111; stroke-width: 2; }
      .edge { fill: none; stroke: #111; stroke-width: 1.6; marker-end: url(#arrow); }
      .line { fill: none; stroke: #111; stroke-width: 1.6; }
      .op { fill: none; stroke: #111; stroke-width: 1.2; }
      .wave { fill: none; stroke: #111; stroke-width: 1.2; }
      .dash { fill: none; stroke: #666; stroke-width: 1.4; stroke-dasharray: 7 5; }
      .box { fill: #fafafa; stroke: #bbb; stroke-width: 1.2; stroke-dasharray: 6 4; }
      .legend-box { fill: #f7f7f7; stroke: #c7c7c7; stroke-width: 1; }
      .txt { font-size: 12px; fill: #111; }
      .small { font-size: 11px; fill: #111; }
      .tiny { font-size: 10px; fill: #555; }
      .muted { font-size: 11px; fill: #555; }
    </style>
  </defs>

  <rect width="1180" height="760" fill="#fff"/>

  <text x="590" y="30" text-anchor="middle" class="title">Graf Cauza-Efect - evaluate_client_package()</text>

  <text x="135" y="62" text-anchor="middle" class="section">Cauze</text>
  <text x="470" y="62" text-anchor="middle" class="section">Logica</text>
  <text x="930" y="62" text-anchor="middle" class="section">Efecte</text>

  <rect x="835" y="70" width="310" height="220" rx="4" class="box"/>
  <text x="990" y="88" text-anchor="middle" class="muted">efecte de eroare</text>

  <rect x="835" y="335" width="310" height="335" rx="4" class="box"/>
  <text x="990" y="353" text-anchor="middle" class="muted">efecte normale</text>

  <path d="M990 290 L990 335" class="dash"/>
  <text x="1002" y="316" class="muted" font-weight="700">M</text>
  <text x="1018" y="316" class="tiny">ValueError opreste evaluarea</text>

  <!-- C1 -->
  <circle cx="230" cy="105" r="28" class="node"/>
  <text x="230" y="110" text-anchor="middle" class="txt" font-weight="700">C1</text>
  <text x="190" y="100" text-anchor="end" class="small">parametri</text>
  <text x="190" y="114" text-anchor="end" class="small">invalizi</text>

  <!-- C2 -->
  <circle cx="230" cy="185" r="28" class="node"/>
  <text x="230" y="190" text-anchor="middle" class="txt" font-weight="700">C2</text>
  <text x="190" y="180" text-anchor="end" class="small">status invalid in</text>
  <text x="190" y="194" text-anchor="end" class="small">session_history</text>

  <!-- C3 -->
  <circle cx="230" cy="265" r="28" class="node"/>
  <text x="230" y="270" text-anchor="middle" class="txt" font-weight="700">C3</text>
  <text x="190" y="260" text-anchor="end" class="small">used_sessions &gt;</text>
  <text x="190" y="274" text-anchor="end" class="small">package_sessions</text>

  <!-- C5 -->
  <circle cx="230" cy="405" r="28" class="node"/>
  <text x="230" y="410" text-anchor="middle" class="txt" font-weight="700">C5</text>
  <text x="190" y="400" text-anchor="end" class="small">remaining_sessions</text>
  <text x="190" y="414" text-anchor="end" class="small">== 0</text>

  <!-- C6 -->
  <circle cx="230" cy="505" r="28" class="node"/>
  <text x="230" y="510" text-anchor="middle" class="txt" font-weight="700">C6</text>
  <text x="190" y="500" text-anchor="end" class="small">no_show &gt; 0</text>
  <text x="190" y="514" text-anchor="end" class="small">(absente)</text>

  <!-- C4 -->
  <circle cx="230" cy="640" r="28" class="node"/>
  <text x="230" y="645" text-anchor="middle" class="txt" font-weight="700">C4</text>
  <text x="190" y="635" text-anchor="end" class="small">has_membership</text>
  <text x="190" y="649" text-anchor="end" class="small">= True</text>

  <!-- Intermediate conditions -->
  <circle cx="520" cy="380" r="16" class="and-node"/>
  <text x="520" y="385" text-anchor="middle" class="txt">1</text>

  <circle cx="520" cy="475" r="16" class="and-node"/>
  <text x="520" y="480" text-anchor="middle" class="txt">2</text>

  <!-- Effects -->
  <circle cx="900" cy="105" r="28" class="node"/>
  <text x="900" y="110" text-anchor="middle" class="txt" font-weight="700">Ef1</text>
  <text x="935" y="100" class="small">ValueError:</text>
  <text x="935" y="114" class="small">params invalizi</text>

  <circle cx="900" cy="185" r="28" class="node"/>
  <text x="900" y="190" text-anchor="middle" class="txt" font-weight="700">Ef2</text>
  <text x="935" y="180" class="small">ValueError:</text>
  <text x="935" y="194" class="small">status invalid</text>

  <circle cx="900" cy="265" r="28" class="node"/>
  <text x="900" y="270" text-anchor="middle" class="txt" font-weight="700">Ef3</text>
  <text x="935" y="260" class="small">ValueError:</text>
  <text x="935" y="274" class="small">used &gt; package</text>

  <circle cx="900" cy="380" r="28" class="node"/>
  <text x="900" y="385" text-anchor="middle" class="txt" font-weight="700">Ef4</text>
  <text x="935" y="375" class="small">completed_</text>
  <text x="935" y="389" class="small">successfully</text>

  <circle cx="900" cy="475" r="28" class="node"/>
  <text x="900" y="480" text-anchor="middle" class="txt" font-weight="700">Ef5</text>
  <text x="935" y="470" class="small">completed_with</text>
  <text x="935" y="484" class="small">_absences</text>

  <circle cx="900" cy="565" r="28" class="node"/>
  <text x="900" y="570" text-anchor="middle" class="txt" font-weight="700">Ef6</text>
  <text x="935" y="560" class="small">status</text>
  <text x="935" y="574" class="small">= active</text>

  <circle cx="900" cy="640" r="28" class="node"/>
  <text x="900" y="645" text-anchor="middle" class="txt" font-weight="700">Ef7</text>
  <text x="935" y="635" class="small">reducere 20%</text>
  <text x="935" y="649" class="small">din total_cost</text>

  <!-- Main relations -->
  <path d="M258 105 H872" class="edge"/>
  <path d="M258 185 H872" class="edge"/>
  <path d="M258 265 H872" class="edge"/>

  <path d="M258 405 L494 370" class="line"/>
  <path d="M258 505 L494 390" class="line"/>
  <path d="M0 0 Q10 -14 20 0 T40 0" class="wave"
        transform="translate(310 478) rotate(-26)"/>
  <path d="M494 370 C482 374 482 386 494 390" class="op"/>
  <text x="472" y="385" text-anchor="middle" font-size="16" fill="#111">^</text>
  <path d="M494 380 H504" class="line"/>

  <path d="M258 405 L494 465" class="line"/>
  <path d="M258 505 L494 485" class="line"/>
  <path d="M494 465 C482 469 482 481 494 485" class="op"/>
  <text x="472" y="480" text-anchor="middle" font-size="16" fill="#111">^</text>
  <path d="M494 475 H504" class="line"/>

  <path d="M258 405 C370 430 455 540 540 540 L872 562" class="edge"/>
  <path d="M0 0 Q10 -14 20 0 T40 0" class="wave"
        transform="translate(315 418) rotate(17)"/>

  <path d="M536 380 H872" class="edge"/>
  <path d="M536 475 H872" class="edge"/>
  <path d="M258 640 H872" class="edge"/>

  <!-- Compact formal constraints -->
  <rect x="715" y="688" width="430" height="48" rx="4" class="legend-box"/>
  <text x="728" y="706" class="small" font-weight="700">Constrangeri M</text>
  <text x="728" y="722" class="tiny">Ef1 mascheaza Ef2-Ef7; Ef2 mascheaza Ef3-Ef7; Ef3 mascheaza Ef4-Ef7.</text>

  <!-- Legend -->
  <rect x="25" y="688" width="430" height="48" rx="4" class="legend-box"/>
  <text x="38" y="706" class="small" font-weight="700">Legenda</text>
  <path d="M38 720 H82" class="edge"/>
  <text x="90" y="724" class="tiny">Implies</text>
  <path d="M160 720 H220" class="edge"/>
  <path d="M0 0 Q8 -11 16 0 T32 0" class="wave"
        transform="translate(176 720)"/>
  <text x="228" y="724" class="tiny">Not-Implies</text>
  <path d="M330 714 L360 719" class="line"/>
  <path d="M330 728 L360 719" class="line"/>
  <path d="M360 711 C350 715 350 723 360 727" class="op"/>
  <text x="344" y="725" text-anchor="middle" font-size="16" fill="#111">^</text>
  <text x="374" y="724" class="tiny">AND</text>
</svg>
