  <rect width="1400" height="1750" fill="#fff"/>
  <text x="700" y="35" text-anchor="middle" class="title">CFG - evaluate_client_package()</text>

  <text x="70" y="75" class="subtitle">Blocuri numerotate</text>
  <text x="70" y="110" class="code">1</text><text x="118" y="110" class="code">Start</text>
  <text x="70" y="138" class="code">2</text><text x="118" y="138" class="code">if date pachet invalide</text>
  <text x="70" y="166" class="code">3</text><text x="118" y="166" class="code">ValueError: invalid package data</text>
  <text x="70" y="194" class="code">4</text><text x="118" y="194" class="code">initializare contoare</text>
  <text x="70" y="222" class="code">5</text><text x="118" y="222" class="code">for: mai exista status?</text>
  <text x="70" y="250" class="code">6</text><text x="118" y="250" class="code">if status invalid</text>
  <text x="70" y="278" class="code">7</text><text x="118" y="278" class="code">ValueError: invalid session status</text>
  <text x="70" y="306" class="code">8</text><text x="118" y="306" class="code">if status == "attended"</text>
  <text x="70" y="334" class="code">9</text><text x="118" y="334" class="code">attended += 1</text>
  <text x="70" y="362" class="code">10</text><text x="118" y="362" class="code">if status == "no_show"</text>
  <text x="70" y="390" class="code">11</text><text x="118" y="390" class="code">no_show += 1</text>
  <text x="70" y="418" class="code">12</text><text x="118" y="418" class="code">if status == "cancelled"</text>
  <text x="70" y="446" class="code">13</text><text x="118" y="446" class="code">cancelled += 1</text>
  <text x="70" y="474" class="code">14</text><text x="118" y="474" class="code">urmatorul status</text>
  <text x="70" y="502" class="code">15</text><text x="118" y="502" class="code">used_sessions = attended + no_show</text>
  <text x="70" y="530" class="code">16</text><text x="118" y="530" class="code">if used_sessions &gt; package_sessions</text>
  <text x="70" y="558" class="code">17</text><text x="118" y="558" class="code">ValueError: used sessions exceed package</text>
  <text x="70" y="586" class="code">18</text><text x="118" y="586" class="code">remaining_sessions si total_cost</text>
  <text x="70" y="614" class="code">19</text><text x="118" y="614" class="code">if has_membership</text>
  <text x="70" y="642" class="code">20</text><text x="118" y="642" class="code">aplica discount</text>
  <text x="70" y="670" class="code">21</text><text x="118" y="670" class="code">if remaining == 0 and no_show == 0</text>
  <text x="70" y="698" class="code">22</text><text x="118" y="698" class="code">status = completed_successfully</text>
  <text x="70" y="726" class="code">23</text><text x="118" y="726" class="code">if remaining == 0</text>
  <text x="70" y="754" class="code">24</text><text x="118" y="754" class="code">status = completed_with_absences</text>
  <text x="70" y="782" class="code">25</text><text x="118" y="782" class="code">status = active</text>
  <text x="70" y="810" class="code">26</text><text x="118" y="810" class="code">return dictionar</text>
  <text x="70" y="838" class="code">27</text><text x="118" y="838" class="code">Stop</text>

  <text x="70" y="900" class="note">Nota: nodurile 3, 7 si 17 sunt iesiri prin exceptie.</text>
  <text x="70" y="920" class="note">Pentru circuite independente se poate adauga arc fictiv final -> 1.</text>

