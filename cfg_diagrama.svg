    </marker>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #111; }
      .subtitle { font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #111; }
      .code { font-family: Arial, sans-serif; font-size: 14px; fill: #111; }
      .small { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .node { fill: #fff; stroke: #111; stroke-width: 2; }
      .edge { fill: none; stroke: #111; stroke-width: 1.6; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #111; stroke-width: 1.3; }
      .note { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
    </style>
