  <circle cx="760" cy="555" r="28" class="node"/><text x="760" y="560" text-anchor="middle" class="code">10</text>
  <circle cx="920" cy="635" r="28" class="node"/><text x="920" y="640" text-anchor="middle" class="code">11</text>
  <circle cx="760" cy="715" r="28" class="node"/><text x="760" y="720" text-anchor="middle" class="code">12</text>
  <circle cx="600" cy="795" r="28" class="node"/><text x="600" y="800" text-anchor="middle" class="code">13</text>
  <circle cx="760" cy="875" r="28" class="node"/><text x="760" y="880" text-anchor="middle" class="code">14</text>
  <circle cx="760" cy="990" r="28" class="node"/><text x="760" y="995" text-anchor="middle" class="code">15</text>
  <circle cx="760" cy="1070" r="28" class="node"/><text x="760" y="1075" text-anchor="middle" class="code">16</text>
  <circle cx="1000" cy="1070" r="28" class="node"/><text x="1000" y="1075" text-anchor="middle" class="code">17</text>
  <circle cx="760" cy="1150" r="28" class="node"/><text x="760" y="1155" text-anchor="middle" class="code">18</text>
  <circle cx="760" cy="1230" r="28" class="node"/><text x="760" y="1235" text-anchor="middle" class="code">19</text>
  <circle cx="600" cy="1310" r="28" class="node"/><text x="600" y="1315" text-anchor="middle" class="code">20</text>
  <circle cx="760" cy="1390" r="28" class="node"/><text x="760" y="1395" text-anchor="middle" class="code">21</text>
  <circle cx="1000" cy="1390" r="28" class="node"/><text x="1000" y="1395" text-anchor="middle" class="code">22</text>
  <circle cx="760" cy="1470" r="28" class="node"/><text x="760" y="1475" text-anchor="middle" class="code">23</text>
  <circle cx="1000" cy="1470" r="28" class="node"/><text x="1000" y="1475" text-anchor="middle" class="code">24</text>
  <circle cx="600" cy="1470" r="28" class="node"/><text x="600" y="1475" text-anchor="middle" class="code">25</text>
  <circle cx="760" cy="1580" r="28" class="node"/><text x="760" y="1585" text-anchor="middle" class="code">26</text>
  <circle cx="760" cy="1660" r="28" class="node"/><text x="760" y="1665" text-anchor="middle" class="code">27</text>

